services:
  nginx:
    depends_on:
      - php
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./www:/var/www/html
    container_name: lab8_nginx

  php:
    build: .
    container_name: lab8_php
    volumes:
    - ./www:/var/www/html
    - ./tests:/var/www/tests
    - ./vendor:/var/www/vendor
    - ./composer.json:/var/www/composer.json
    - ./phpunit.xml:/var/www/phpunit.xml
    working_dir: /var/www
    expose:
      - "9000"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: lab8_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: lab5_db
      MYSQL_USER: lab5_user
      MYSQL_PASSWORD: lab5_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: lab8_adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  db_data: